<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Space Invaders de Marseille — carte interactive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  :root{
    --bg:#eef1f5; --panel:#ffffff; --panel2:#f6f8fb; --txt:#1c2430; --muted:#5d6b7e;
    --ok:#1fa463; --dam:#e08a16; --ldam:#cf9f0a; --dest:#d23b30; --accent:#3358d4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}
  #map{position:absolute;top:0;left:0;right:0;bottom:0;background:#eef1f5}
  .panel{position:absolute;z-index:1000;background:var(--panel);border:1px solid #d8dee7;border-radius:12px;box-shadow:0 6px 22px rgba(20,30,50,.12)}
  #header{top:12px;left:12px;right:12px;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  #header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  #header h1 span{color:var(--accent)}
  .stat{font-size:12px;color:var(--muted)}
  .stat b{color:var(--txt)}
  #controls{top:70px;left:12px;width:230px;padding:12px 14px;font-size:13px}
  #controls h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px}
  .row{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;user-select:none}
  .row input{accent-color:var(--accent);width:15px;height:15px}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(255,255,255,.25)}
  .dot.ok{background:var(--ok)} .dot.dam{background:var(--dam)} .dot.ldam{background:var(--ldam)} .dot.dest{background:var(--dest)}
  .cnt{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums}
  #search{margin-top:10px;width:100%;padding:7px 9px;border-radius:8px;border:1px solid #d8dee7;background:var(--panel2);color:var(--txt);font-size:13px}
  #search::placeholder{color:#9aa6b5}
  .hint-note{margin-top:10px;font-size:11px;color:var(--muted);line-height:1.45}
  .leaflet-popup-content-wrapper{background:var(--panel2);color:var(--txt);border-radius:12px}
  .leaflet-popup-tip{background:var(--panel2)}
  .pop{min-width:190px;font-size:13px}
  .pop .id{font-size:16px;font-weight:700;margin-bottom:2px}
  .pop .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-bottom:8px}
  .pop .pts{font-weight:600}
  .pop .hint{color:var(--muted);font-style:italic;margin:6px 0}
  .pop a{color:var(--accent);text-decoration:none;display:inline-block;margin-top:6px;margin-right:12px;font-size:12px}
  .pop a:hover{text-decoration:underline}
  .marker-pin{width:16px;height:16px;border-radius:50%;border:2px solid #ffffff;box-shadow:0 0 0 1.5px rgba(0,0,0,.35)}
  @media(max-width:640px){#controls{top:auto;bottom:12px;left:12px;right:12px;width:auto}#header h1{font-size:14px}}
  .credit{position:absolute;bottom:4px;right:8px;z-index:1000;font-size:10px;color:var(--muted);background:rgba(255,255,255,.75);padding:2px 6px;border-radius:6px}
  .credit a{color:var(--muted)}
</style>
</head>
<body>
<div id="map"></div>
<div id="header" class="panel">
  <h1>👾 Space Invaders de <span>Marseille</span></h1>
  <div class="stat"><b id="s-total">0</b> mosaïques</div>
  <div class="stat"><b id="s-visible">0</b> visibles</div>
  <div class="stat"><b id="s-pts">0</b> points</div>
  <div class="stat" id="s-shown" style="margin-left:auto"></div>
</div>
<div id="controls" class="panel">
  <h2>Filtres par statut</h2>
  <label class="row"><input type="checkbox" data-st="OK" checked><span class="dot ok"></span>Visible (OK)<span class="cnt" id="c-OK"></span></label>
  <label class="row"><input type="checkbox" data-st="damaged" checked><span class="dot dam"></span>Endommagé<span class="cnt" id="c-damaged"></span></label>
  <label class="row"><input type="checkbox" data-st="a little damaged" checked><span class="dot ldam"></span>Légèrement end.<span class="cnt" id="c-ald"></span></label>
  <label class="row"><input type="checkbox" data-st="destroyed" checked><span class="dot dest"></span>Détruit / disparu<span class="cnt" id="c-destroyed"></span></label>
  <input id="search" placeholder="Chercher un code (ex : MARS_12)"/>
  <div class="hint-note">Clique un marqueur pour les points, le statut et un lien Street View. Positions <b>approximatives</b> (à ~10 m).</div>
</div>
<div class="credit">Données : <a href="https://github.com/goguelnikov/SpaceInvaders" target="_blank">SpaceInvaders DB</a> · <a href="https://www.invader-spotter.art/" target="_blank">Invader-Spotter</a></div>

const LABELS = {"OK":"Visible","damaged":"Endommagé","a little damaged":"Légèrement endommagé","destroyed":"Détruit / disparu"};

const map = L.map('map',{zoomControl:true}).setView([43.2895,5.378],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:20, subdomains:'abcd'
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius:45,spiderfyOnMaxZoom:true});
const markers = [];

function popupHtml(d){
  const c = COLORS[d.status]||'#888';
  const sv = `https://www.google.com/maps?q=&layer=c&cbll=${d.lat},${d.lng}`;
  const itin = `https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}`;
  return `<div class="pop">
    <div class="id">${d.id}</div>
    <span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}66">${LABELS[d.status]||d.status}</span>
    <div class="pts">${d.points!=null?d.points+' points':'points n.c.'}</div>
    ${d.hint?`<div class="hint">“${d.hint}”</div>`:''}
    <a href="${sv}" target="_blank">📷 Street View</a>
    <a href="${itin}" target="_blank">🧭 Itinéraire</a>
  </div>`;
}

DATA.forEach(d=>{
  if(d.lat==null||d.lng==null) return;
  const c = COLORS[d.status]||'#888';
  const m = L.marker([d.lat,d.lng],{
    icon:L.divIcon({className:'',html:`<div class="marker-pin" style="background:${c}"></div>`,iconSize:[16,16],iconAnchor:[8,8]})
  });
  m.bindPopup(popupHtml(d));
  m.bindTooltip(d.id,{direction:'top',offset:[0,-8]});
  m._inv = d;
  markers.push(m);
});

function refresh(){
  const active = {};
  document.querySelectorAll('#controls input[data-st]').forEach(cb=>active[cb.dataset.st]=cb.checked);
  const q = (document.getElementById('search').value||'').trim().toUpperCase();
  cluster.clearLayers();
  let shown=0;
  markers.forEach(m=>{
    const d=m._inv;
    const okStatus = active[d.status]!==false;
    const okSearch = !q || d.id.toUpperCase().includes(q);
    if(okStatus && okSearch){cluster.addLayer(m);shown++;}
  });
  document.getElementById('s-shown').textContent = shown+' affichés';
}

document.querySelectorAll('#controls input[data-st]').forEach(cb=>cb.addEventListener('change',refresh));
document.getElementById('search').addEventListener('input',refresh);
map.addLayer(cluster);

// stats
const counts={"OK":0,"damaged":0,"a little damaged":0,"destroyed":0};
let pts=0, visible=0;
DATA.forEach(d=>{counts[d.status]=(counts[d.status]||0)+1; pts+=d.points||0; if(d.status==='OK')visible++;});
document.getElementById('s-total').textContent=DATA.length;
document.getElementById('s-visible').textContent=visible;
document.getElementById('s-pts').textContent=pts.toLocaleString('fr-FR');
document.getElementById('c-OK').textContent=counts['OK']||0;
document.getElementById('c-damaged').textContent=counts['damaged']||0;
document.getElementById('c-ald').textContent=counts['a little damaged']||0;
document.getElementById('c-destroyed').textContent=counts['destroyed']||0;

refresh();
const grp=L.featureGroup(markers);
map.fitBounds(grp.getBounds().pad(0.05));
</script>
</body>
</html>
